<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juego Mapa</title>

  <style>
    body{
      font-family: Arial, sans-serif;
    }

    .general{
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      width: 320px;
      margin: 50px auto;
    }

    .celda{
      border: solid 2px black;
      text-align: center;
      padding: 30px;
      font-size: 20px;
      cursor: pointer;
      user-select: none;
      transition: 0.2s;
    }

    .celda:hover{
      background-color: #ddd;
    }

    .activa{
      background-color: lightgreen;
    }
  </style>
</head>

<body>

  <main>
    <div class="general" id="tablero">
      <div class="celda" data-pos="1">1</div>
      <div class="celda" data-pos="2">2</div>
      <div class="celda" data-pos="3">3</div>
      <div class="celda" data-pos="4">4</div>

      <div class="celda" data-pos="5">5</div>
      <div class="celda" data-pos="6">6</div>
      <div class="celda" data-pos="7">7</div>
      <div class="celda" data-pos="8">8</div>

      <div class="celda" data-pos="9">9</div>
      <div class="celda" data-pos="10">10</div>
      <div class="celda" data-pos="11">11</div>
      <div class="celda" data-pos="12">12</div>

      <div class="celda" data-pos="13">13</div>
      <div class="celda" data-pos="14">14</div>
      <div class="celda" data-pos="15">15</div>
      <div class="celda" data-pos="16">16</div>
    </div>
  </main>

  <script>
    const celdas = document.querySelectorAll(".celda");

    celdas.forEach(celda => {
      celda.addEventListener("click", () => {

        const pos = celda.dataset.pos;
        console.log("Click en:", pos);

        // efecto visual (toggle)
        celda.classList.toggle("activa");
      });
    });
  </script>

</body>
</html>
